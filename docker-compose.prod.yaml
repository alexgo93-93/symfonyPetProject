services:
  php:
    build:
      target: prod
    restart: always
    # НЕ монтируем код — он внутри образа
    volumes: []
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"

  nginx:
    restart: always
    volumes:
      # Код не монтируем, он внутри php-образа
      # Nginx будет отдавать статику через php:9000
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf

  postgres:
    restart: always
    ports: []  # Закрываем внешний доступ к БД