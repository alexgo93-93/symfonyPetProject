server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    # Корневая директория Symfony - папка public

    # Отдаем статические файлы напрямую
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Обработка PHP файлов через PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        # Подключаемся к контейнеру php на порт 9000
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Блокируем доступ к скрытым файлам
    location ~ /\. {
        deny all;
    }

    # Блокируем доступ к логическим файлам
    location ~ /(config|var|src|tests)/ {
        deny all;
    }

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}